server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # GET /api/snapshots — cho phép đọc danh sách (dùng trong Train page)
    # POST /api/snapshots — block, tạo snapshot qua /api/train/start
    location = /api/snapshots {
        if ($request_method = POST) {
            return 403;
        }
        proxy_pass http://labeling-backend:8001/snapshots;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API to backend service
    location /api/ {
        proxy_pass http://labeling-backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
